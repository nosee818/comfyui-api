<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建工作流 - ComfyUI Gateway</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text); font-size: 14px; font-family: inherit;
        }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
        .section { margin: 32px 0; padding-top: 24px; border-top: 1px solid var(--border); }
        .section h2 { font-size: 18px; margin-bottom: 16px; }
        #analyze-output { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 16px; margin-top: 12px; white-space: pre-wrap; font-family: monospace; font-size: 13px; display: none; }
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    </style>
</head>
<body>
    <nav>
        <span class="brand">ComfyUI Gateway</span>
        <a href="/">概览</a>
        <a href="/configs" class="active">工作流</a>
        <a href="/servers">服务器</a>
        <a href="/stats">统计</a>
        <a href="/settings">设置</a>
        <a href="/docs" target="_blank">API 文档</a>
    </nav>
    <main>
        <h1>新建工作流配置</h1>
        <p class="subtitle">上传 ComfyUI workflow JSON → AI 自动分析 → 确认参数 → 保存</p>

        <div class="two-col">
            <div>
                <!-- Step 1: 上传 workflow JSON -->
                <div class="section">
                    <h2>1. 上传 Workflow JSON</h2>
                    <form id="analyze-form" onsubmit="analyzeWorkflow(event)">
                        <div class="form-group">
                            <input type="file" id="wf-file" accept=".json" required>
                        </div>
                        <button type="submit" class="btn btn-primary">AI 自动分析</button>
                    </form>
                    <div id="analyze-output"></div>
                </div>

                <!-- Step 2: 确认参数 -->
                <div class="section" id="confirm-section" style="display:none">
                    <h2>2. 确认配置</h2>
                    <form id="config-form" onsubmit="saveConfig(event)">
                        <div class="form-group">
                            <label>API 路由</label>
                            <input name="route" placeholder="/my-workflow" required>
                        </div>
                        <div class="form-group">
                            <label>名称</label>
                            <input name="name" placeholder="我的工作流" required>
                        </div>
                        <div class="form-group">
                            <label>描述</label>
                            <textarea name="description" placeholder="描述这个 API 的功能..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Workflow JSON 文件名</label>
                            <input name="workflow_file" placeholder="my-workflow.json" required>
                        </div>
                        <div class="form-group">
                            <label>后端服务器（勾选适用的）</label>
                            <div id="server-checkboxes" style="padding:8px 0;">
                                <span class="text-muted">加载中...</span>
                            </div>
                            <input type="hidden" name="backend_servers" id="backend-servers-input" value="">
                        </div>
                        <div class="form-group">
                            <label>超时（秒）</label>
                            <input name="timeout" type="number" value="120">
                        </div>
                        <div class="form-group">
                            <label>输出节点 ID</label>
                            <input name="output_node_id" id="output-node-id">
                        </div>
                        <input type="hidden" name="inputs_json" id="inputs-json" value="[]">
                        <button type="submit" class="btn btn-primary" style="width:100%">保存配置</button>
                    </form>
                </div>
            </div>

            <div id="preview-section" style="display:none">
                <div class="section">
                    <h2>参数预览</h2>
                    <div id="inputs-preview"></div>
                </div>
            </div>
        </div>
    </main>
    <script>
        let analyzedConfig = null;

        // 加载服务器列表，渲染复选框
        async function loadServers() {
            const container = document.getElementById('server-checkboxes');
            try {
                const resp = await fetch('/api/servers');
                const servers = await resp.json();
                if (!servers.length) {
                    container.innerHTML = '<span class="text-muted">暂无服务器，请先在<a href="/servers">服务器管理</a>中添加</span>';
                    return;
                }
                container.innerHTML = servers.map(s => {
                    const status = s.online ? '在线' : '离线';
                    const color = s.online ? 'var(--green)' : 'var(--red)';
                    return `<label style="display:inline-flex;align-items:center;gap:8px;margin:4px 16px 4px 0;cursor:pointer">
                        <input type="checkbox" name="server_check" value="${s.server_id}" style="accent-color:var(--accent)">
                        <span>${s.name}</span>
                        <code style="font-size:11px">${s.host}:${s.port}</code>
                        <span style="font-size:11px;color:${color}">${status}</span>
                    </label>`;
                }).join('');
            } catch(e) {
                container.innerHTML = '<span class="text-muted">加载失败</span>';
            }
        }

        // 收集勾选的服务器
        function collectServers() {
            const checks = document.querySelectorAll('input[name="server_check"]:checked');
            return Array.from(checks).map(c => c.value).join(',');
        }

        loadServers();

        async function analyzeWorkflow(e) {
            e.preventDefault();
            const file = document.getElementById('wf-file').files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('workflow_file', file);

            const resp = await fetch('/api/configs/analyze', {
                method: 'POST', body: formData
            });
            analyzedConfig = await resp.json();

            // 显示原始分析结果
            document.getElementById('analyze-output').textContent = JSON.stringify(analyzedConfig, null, 2);
            document.getElementById('analyze-output').style.display = 'block';

            // 填充表单
            document.getElementById('confirm-section').style.display = 'block';
            document.getElementById('preview-section').style.display = 'block';

            document.querySelector('[name="name"]').value = analyzedConfig.name || '';
            document.querySelector('[name="description"]').value = analyzedConfig.description || '';
            document.querySelector('[name="output_node_id"]').value = analyzedConfig.output_node_id || '';
            document.getElementById('inputs-json').value = JSON.stringify(analyzedConfig.inputs || []);

            // 参数预览
            const preview = document.getElementById('inputs-preview');
            const inputs = analyzedConfig.inputs || [];
            preview.innerHTML = inputs.length
                ? '<table><thead><tr><th>参数名</th><th>类型</th><th>必填</th><th>注入节点</th><th>注入字段</th></tr></thead><tbody>' +
                  inputs.map(i => `<tr><td>${i.name}</td><td>${i.type}</td><td>${i.required ? '是' : '否'}</td><td>${i.inject_to?.node_id||'-'}</td><td>${i.inject_to?.field||'-'}</td></tr>`).join('') +
                  '</tbody></table>'
                : '<p class="text-muted">未检测到可配置参数</p>';
        }

        async function saveConfig(e) {
            e.preventDefault();
            const form = document.getElementById('config-form');
            const formData = new FormData(form);
            // 设置勾选的服务器
            formData.set('backend_servers', collectServers());
            const resp = await fetch('/api/configs', {
                method: 'POST', body: formData
            });
            if (resp.ok) {
                const data = await resp.json();
                alert('配置已保存！路由: ' + data.route);
                window.location.href = '/configs';
            } else {
                const err = await resp.json();
                alert('保存失败: ' + (err.detail || JSON.stringify(err)));
            }
        }
    </script>
</body>
</html>
